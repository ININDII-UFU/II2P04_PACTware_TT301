[data]
kitId=1

[env:esp32]
platform = espressif32
framework = arduino
board = esp32dev
; board = esp32-s3-devkitc-1 ;Para ESP32-S3, troque esse board e descomente as flags USB:
monitor_speed = 115200
; monitor_port = socket://inindkit${data.kitId}.local:4000
; upload_protocol = espota ;Caso use OTA
; upload_port = inindkit${data.kitId}.local
build_src_filter = +<hartUDP.cpp>
build_flags = 
    -DKIT_ID=${data.kitId} 
    -DKIT_HOSTNAME='"iikit${data.kitId}"'
lib_deps = 
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    adafruit/Adafruit BusIO @ ^1.16.0
    tzapu/WiFiManager @ ^2.0.0
	yellobyte/DacESP32@^1.1.1    
	miq19/eModbus@^1.7.3 ; emelianov/modbus-esp8266@ ^4.1.0
